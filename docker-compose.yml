# version: '3.8'

services:
  db:
    ## 8.0選択理由
    # 1. LTS
    # 2. 情報量
    image: mysql:8.0 # or 8.4
    container_name: yobikou_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: yobikou_system
      MYSQL_USER: user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  backend:
    build: ./backend
    container_name: yobikou_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://user:${DB_PASSWORD}@db:3306/yobikou_system
    depends_on:
      - db
    volumes:
      - ./backend:/app
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yobikou_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true  # Reactのホットリロード
    environment:
      - CHOKIDAR_USEPOLLING=true # Docker環境下でのホットリロード
    tty: true
    depends_on:
      - backend
  
  # local object storage 
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # S3 API port 
      - "9001:9001" # object storage 管理UI port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER} # == S3 access key
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD} # == S3 Secret key
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  db_data:
  minio_data:
